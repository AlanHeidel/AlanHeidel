name: GitHub Metrics

on:
  schedule:
    # Se ejecuta diariamente
    - cron: "0 3 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest

    steps:
      # Calendario isométrico de contribuciones
      - name: Generate isometric calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
