name: GitHub Metrics

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate isometric calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |
            :root {
              background-color: transparent;
              border-radius: 12px;
            }

            .items-wrapper {
              background-color: transparent;
            }

            svg {
              color: #FFFF;
            }
            
            h2.field {
              display: none;
              }
  
            h3 {
              color: #FFFF !important;
              font-size: 12px !important;
            }

            h3 svg {
              fill: #FFFF
              width: 13px !important;
              height: 13px !important;
            }

            .field svg {
              fill: #9CA3AF !important;
              }

            svg[viewBox="0,0 480,270"] path[fill="#ebedf0"] {
              fill: #374151 !important;
            }

            svg[viewBox="0,0 480,270"] path[fill="#9be9a8"] {
              fill: #E9D5FF !important;
            }

            svg[viewBox="0,0 480,270"] path[fill="#40c463"] {
              fill: #C084FC !important;
            }

            svg[viewBox="0,0 480,270"] path[fill="#30a14e"] {
              fill: #9333EA !important;
            }

            svg[viewBox="0,0 480,270"] path[fill="#216e39"] {
              fill: #521057 !important;
              animation: contribution-pulse 3.5s ease-in-out infinite;
              transform-box: fill-box;
              transform-origin: center;
            }

            @keyframes contribution-pulse {
              0%, 100% {
                filter: drop-shadow(0 0 0 rgba(192, 132, 252, 0));
                opacity: 1;
              }

              50% {
                filter: drop-shadow(0 0 3px rgba(192, 132, 252, 0.9));
                opacity: 0.85;
              }
              
            extras_js: |
              document.querySelectorAll("h2.field").forEach((el) => {
                if (el.textContent.includes("Contributions calendar")) {
                  el.remove();
                }
              });
